<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>GUOWS Available Domains</title>

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/domain-card.css">
<link rel="stylesheet" href="/css/email-popup.css">

</head>

<body>

<header class="navbar">

<div class="nav-left">

<div class="site-title">GUOWS</div>
<div class="site-subtitle">Available domains to purchase</div>

</div>

<div class="nav-right">

<!-- favorites icon -->

<div class="favorites-icon" id="favoritesBtn">

<svg viewBox="0 0 24 24" width="28" height="28">
<path d="M12 20.8c-.3 0-.6-.1-.8-.3C8.5 18.1 2 13.1 2 8.5 2 5.5 4.5 3 7.5 3c1.9 0 3.7 1 4.5 2.6C12.8 4 14.6 3 16.5 3 19.5 3 22 5.5 22 8.5c0 4.6-6.5 9.6-9.2 12-.2.2-.5.3-.8.3z"/>
</svg>

<span class="favorites-count" id="favoritesCount">0</span>

</div>


<!-- email icon -->

<div class="email-icon" id="emailBtn">

<svg viewBox="0 0 24 24" width="30" height="30">
<path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v.01L12 13 20 6.01V6H4zm16 12V8l-8 6-8-6v10h16z"/>
</svg>

</div>

</div>

</header>


<main class="container" id="domains-container">
</main>


<!-- FAVORITES POPUP -->

<div class="favorites-popup" id="favoritesPopup">

<div class="favorites-glass">

<div class="favorites-header">

<div class="favorites-title">Liked Domains</div>

<div class="favorites-close" id="favoritesClose">✕</div>

</div>

<div class="favorites-list" id="favoritesList">
</div>

</div>

</div>



<!-- EMAIL POPUP -->

<div class="email-popup" id="emailPopup">

<div class="email-glass">

<div class="email-header">

<div class="email-title">Email Inquiry</div>

<div class="email-close" id="emailClose">✕</div>

</div>

<div id="emailDomainsList"></div>

<button class="submit-btn" id="emailContinue">
Continue
</button>
<div class="domain-desc-v">
You can contact me by email for info.
</div>
</div>

</div>


<script src="/js/domains.js"></script>
<script src="/js/accordion.js"></script>
<script src="/js/heart.js"></script>
<script src="/js/favorites.js"></script>
<script src="/js/email.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
